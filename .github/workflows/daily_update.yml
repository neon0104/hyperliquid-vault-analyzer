name: Daily Vault Data Update

on:
  schedule:
    # 매일 UTC 00:00 (오전 9시), 03:00 (낮 12시), 06:00 (오후 3시) 실행
    - cron: '0 0,3,6 * * *'
  # 수동으로 원할 때 언제든 실행할 수 있도록 허용
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    # 저장소 내용 조작(커밋 및 푸시)을 위한 권한 설정
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pre Run Check
        id: pre_check
        run: python pre_run_check.py

      - name: Run Vault Analysis (Fetch Data)
        if: steps.pre_check.outputs.skip != 'true'
        run: |
          python analyze_top_vaults.py --force

      - name: Verify Data Health (Hook)
        id: health_check
        if: steps.pre_check.outputs.skip != 'true'
        run: |
          python check_data_health.py

      - name: Export Dashboard Data
        if: steps.pre_check.outputs.skip != 'true'
        run: |
          python export_dashboard_data.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 새롭게 생성된 스냅샷 파일이나 데이터가 있다면 추가 (명시적 강제 추가)
          git add -f vault_data/snapshots/*.json || true
          git add -A vault_data/ || true
          git add docs/data.json
          
          # 변경사항이 없으면 커밋하지 않음
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update vault data [skip ci]" && git push)

      - name: Check Final Retry
        if: failure()
        id: check_final
        run: |
          # UTC 6 (KST 15)인지 검사. (마지막 3차 재시도)
          current_hour=$(date -u +%-H)
          if [ "$current_hour" -ge 6 ]; then
            echo "send_email=true" >> $GITHUB_OUTPUT
          else
            echo "send_email=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Alert Email
        if: failure() && steps.check_final.outputs.send_email == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "🚨 Hyperliquid Vault Analyzer: 분석 지연 알림 (최종)"
          to: ${{ secrets.TO_EMAIL }}
          from: "Hyperliquid Bot"
          body: "오전 9시, 12시, 오후 3시(최종)까지 총 3회의 데이터 수집 시도가 거래소 API 응답 지연 등의 사유로 모두 실패했습니다. 수동으로 데이터 수집 스크립트를 실행해 주시기 바랍니다."

