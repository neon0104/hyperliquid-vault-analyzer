name: Daily Vault Data Update

on:
  schedule:
    # 매일 UTC 21:00 (KST 오전 6시) 실행 - GitHub 지연을 고려해 오전 9시 전후로 완료되도록 확보
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pre Run Check
        id: pre_check
        run: python pre_run_check.py

      - name: Run Vault Analysis (with retries)
        id: analysis
        if: steps.pre_check.outputs.skip != 'true'
        run: |
          MAX_RETRIES=3
          RETRY_COUNT=0
          SUCCESS=false
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY_COUNT+1)) of $MAX_RETRIES..."
            if python analyze_top_vaults.py --force; then
              SUCCESS=true
              break
            fi
            RETRY_COUNT=$((RETRY_COUNT+1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "Analysis failed. Sleeping 60s before retry..."
              sleep 60
            fi
          done
          if [ "$SUCCESS" = false ]; then
            echo "::error::Vault analysis failed after $MAX_RETRIES attempts."
            exit 1
          fi

      - name: Verify Data Health
        id: health_check
        if: steps.pre_check.outputs.skip != 'true'
        run: python check_data_health.py || (echo "::warning::Data health check failed, but proceeding to commit." && exit 0)

      - name: Export Dashboard Data
        if: steps.pre_check.outputs.skip != 'true'
        run: python export_dashboard_data.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add -f vault_data/snapshots/*.json || true
          git add -A vault_data/ || true
          git add docs/data.json || true
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update vault data $(date -u +%Y-%m-%d)" && git push)

      # ── 알림: 성공 시 Discord 알림 ──
      - name: Notify Success (Discord)
        if: success() && steps.pre_check.outputs.skip != 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then exit 0; fi
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          SNAP_SIZE=$(stat -f%z vault_data/snapshots/${TODAY}.json 2>/dev/null || stat --format=%s vault_data/snapshots/${TODAY}.json 2>/dev/null || echo "0")
          SNAP_KB=$((SNAP_SIZE / 1024))
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"✅ 볼트 데이터 수집 완료\",\"description\":\"**${TODAY}** 데이터가 정상 수집되었습니다.\n📊 스냅샷: ${SNAP_KB}KB\n🌐 [대시보드 확인](https://neon0104.github.io/hyperliquid-vault-analyzer/)\",\"color\":5763719}]}" \
            "$DISCORD_WEBHOOK"

      # ── 알림: 실패 시 Discord 알림 ──
      - name: Notify Failure (Discord)
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "::error title=🚨 데이터 수집 실패::볼트 데이터 수집에 실패했습니다. GitHub Actions 로그를 확인하세요."
            exit 1
          fi
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\":\"<@&everyone>\",\"embeds\":[{\"title\":\"🚨 볼트 데이터 수집 실패\",\"description\":\"**${TODAY}** 데이터 수집이 실패했습니다.\n\n🔗 [로그 확인](${RUN_URL})\n\n자동 fallback도 실패한 경우 수동 확인이 필요합니다.\",\"color\":15548997}]}" \
            "$DISCORD_WEBHOOK"
          exit 1
